name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck

  test:
    name: test (${{ matrix.os }} · node ${{ matrix.node }})
    needs: typecheck
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['22', '24']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci
      - run: npm test

  # The extension's analog of devspec's CLI smoke test: prove the thing
  # actually builds and packages into a .vsix. A broken esbuild config or a
  # bad .vscodeignore fails here long before anyone tries to publish.
  package:
    name: build + vsce package
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Package the extension (.vsix)
        run: npx --no-install vsce package --no-dependencies --out devspec.vsix
      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: devspec-vsix
          path: devspec.vsix
          if-no-files-found: error
